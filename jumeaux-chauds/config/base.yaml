# ─── Identité du cluster ──────────────────────────────────────────────────────
cluster:
  id: "cluster_alpha"
  location: "Marseille"
  pue: 1.40                          # Power Usage Effectiveness global
  env_factor: 1.05                   # multiplicateur overhead refroidissement
  electricity_price_eur_kwh: 0.20    # coût €/kWh

  # ─── Broker MQTT ─────────────────────────────────────────────────────────────
  mqtt:
    broker_host: "mosquitto"
    broker_port: 1883
    protocol_version: 5              # MQTTv5 via aiomqtt
    client_id_prefix: "twin"
    topic_root: "dt"                 # data telemetry (convention AWS IoT)
    cmd_root: "cmd"                  # commands
    publish_interval_s: 1.0
    qos_telemetry: 0
    qos_events: 1                    # QoS 1 pour pannes et changements d'état

  # ─── Profils par rôle ────────────────────────────────────────────────────────
  role_profiles:
    master:
      initial_status: "on"           # toutes les masters démarrent allumées
      power:
        idle_watts: 200.0
        max_watts: 1700.0
        heat_ratio: 0.70
      thermal:
        ambient_temp_c: 22.0
        thermal_capacity_j_per_c: 800.0
        tau_max_s: 90.0              # constante de temps thermique max (fans off)
        k_cool_rpm_factor: 3.5       # contribution refroidissement par rpm×1000
        alpha_load_exponent: 1.5     # non-linéarité charge → puissance
        t_shutdown_c: 90.0
        t_restart_c: 55.0
      temperature_sensors:
        - id: "temp_cpu"
          bias_c: 0.0
        - id: "temp_inlet"
          bias_c: -8.0
        - id: "temp_chassis"
          bias_c: -4.0
      fans:
        count: 2
        max_rpm: 5000
        initial_rpm: 0
        power_per_fan_w: 15.0
        control_mode: "auto"         # "auto" | "manual"
        auto_policy:
          type: "proportional"
          gain_rpm_per_c: 50.0
      noise:
        temperature_std_c: 0.3
        power_std_w: 2.0
        fan_speed_std_rpm: 10.0

    worker:
      initial_status: "on"           # tous les workers démarrent allumés
      power:
        idle_watts: 100.0
        max_watts: 1450.0
        heat_ratio: 0.70
      thermal:
        ambient_temp_c: 22.0
        thermal_capacity_j_per_c: 600.0
        tau_max_s: 100.0
        k_cool_rpm_factor: 3.0
        alpha_load_exponent: 1.5
        t_shutdown_c: 88.0
        t_restart_c: 50.0
      temperature_sensors:
        - id: "temp_cpu"
          bias_c: 0.0
        - id: "temp_inlet"
          bias_c: -6.0
      fans:
        count: 2
        max_rpm: 5000
        initial_rpm: 0
        power_per_fan_w: 12.0
        control_mode: "auto"
        auto_policy:
          type: "proportional"
          gain_rpm_per_c: 45.0
      noise:
        temperature_std_c: 0.3
        power_std_w: 1.5
        fan_speed_std_rpm: 8.0

  # ─── Machines du cluster ─────────────────────────────────────────────────────
  machines:
    - id: "srv-master-01"
      role: "master"
    - id: "srv-master-02"
      role: "master"
      thermal:                       # surcharge individuelle
        t_shutdown_c: 92.0
    - id: "srv-worker-01"
      role: "worker"
    - id: "srv-worker-02"
      role: "worker"
    - id: "srv-worker-03"
      role: "worker"
      initial_status: "off"          # exemple : worker-03 démarre éteint
