simulation:
  mode: "nominal"
  tick_rate_hz: 10.0
  events_per_sec: 1.0
  duration: "0"                      # "0" = infini ; "1h30m" = durée finie

  load_profile:
    type: "sine_wave"
    base_load: 0.35
    amplitude: 0.20
    period_s: 300.0

  noise:
    enabled: true
    spike_probability: 0.002
    spike_magnitude_c: 2.0
    drift:
      enabled: false
      rate_c_per_s: 0.0

  fault_injection:
    enabled: false
    faults: []
    recovery_delay_s: 120.0
