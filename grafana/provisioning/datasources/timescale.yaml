# Provisioning automatique de la datasource PostgreSQL / TimescaleDB
apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: jumeaux
    user: jumeaux
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-jumeaux}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
