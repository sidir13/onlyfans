# Provisioning automatique des dashboards Grafana
apiVersion: 1

providers:
  - name: jumeaux-chauds
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
